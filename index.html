<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de URL HLS & TS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e, #1a1a3e, #0f0c29);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #f2f2f2;
            position: relative;
            overflow-x: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Decorative blobs */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            pointer-events: none;
        }

        .blob-1 {
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, #4f8ef7, transparent 70%);
            top: -10%;
            left: -5%;
            animation: float 20s ease-in-out infinite;
        }

        .blob-2 {
            width: 35vw;
            height: 35vw;
            background: radial-gradient(circle, #a855f7, transparent 70%);
            bottom: -10%;
            right: -5%;
            animation: float 25s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, -30px); }
        }

        .container {
            width: 100%;
            max-width: 500px;
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Header */
        .header {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .icon-box {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(79, 142, 247, 0.2);
            border: 1px solid rgba(79, 142, 247, 0.4);
            box-shadow: 0 0 30px rgba(79, 142, 247, 0.3);
            margin-bottom: 8px;
        }

        .icon-box svg {
            width: 26px;
            height: 26px;
            color: #4f8ef7;
        }

        h1 {
            font-size: 30px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #f5f5f5;
        }

        .subtitle {
            font-size: 14px;
            color: #a6a6a6;
        }

        .subtitle span {
            color: #4f8ef7;
        }

        /* Glass Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Form Group */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #999;
        }

        input {
            width: 100%;
            padding: 10px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.06);
            color: #f2f2f2;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
        }

        input::placeholder {
            color: #666;
        }

        input:focus {
            border-color: rgba(79, 142, 247, 0.4);
            box-shadow: 0 0 0 2px rgba(79, 142, 247, 0.5);
            background: rgba(255, 255, 255, 0.08);
        }

        /* Buttons */
        .button-group {
            display: flex;
            gap: 12px;
            padding-top: 8px;
        }

        button {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 12px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4f8ef7, #3a5fd4);
            color: #fff;
            box-shadow: 0 4px 20px rgba(79, 142, 247, 0.4);
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #a6a6a6;
        }

        .btn-secondary:hover {
            opacity: 0.8;
        }

        .btn-secondary:active {
            transform: scale(0.98);
        }

        /* Results */
        .results {
            display: flex;
            flex-direction: column;
            gap: 16px;
            animation: slideUp 0.4s ease forwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .result-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .result-label {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .result-icon {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .result-icon.hls {
            background: rgba(79, 142, 247, 0.2);
            border: 1px solid rgba(79, 142, 247, 0.4);
            color: #4f8ef7;
        }

        .result-icon.ts {
            background: rgba(120, 81, 169, 0.2);
            border: 1px solid rgba(120, 81, 169, 0.4);
            color: #7851a9;
        }

        .tag {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .tag.hls {
            color: #4f8ef7;
        }

        .tag.ts {
            color: #7851a9;
        }

        .copy-btn {
            flex: none;
            width: auto;
            padding: 6px 12px;
            font-size: 12px;
            background: rgba(79, 142, 247, 0.2);
            border: 1px solid rgba(79, 142, 247, 0.4);
            color: #4f8ef7;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .copy-btn:hover {
            background: rgba(79, 142, 247, 0.3);
        }

        .copy-btn:active {
            transform: scale(0.95);
        }

        .copy-btn.copied {
            background: rgba(85, 200, 100, 0.2);
            border-color: rgba(85, 200, 100, 0.4);
            color: #55c864;
        }

        .url-output {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            padding: 12px;
            font-size: 12px;
            line-height: 1.6;
            color: #d1d5d8;
            word-break: break-all;
            max-height: 120px;
            overflow-y: auto;
        }

        /* Footer */
        .footer {
            text-align: center;
            font-size: 12px;
            color: #666;
        }

        /* Hidden class */
        .hidden {
            display: none !important;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(24, 28, 48, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            padding: 12px 16px;
            color: #f2f2f2;
            font-size: 13px;
            backdrop-filter: blur(20px);
            z-index: 1000;
            animation: slideIn 0.3s ease;
            max-width: 90vw;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .toast.success {
            border-color: rgba(85, 200, 100, 0.4);
            color: #55c864;
        }

        .toast.error {
            border-color: rgba(255, 100, 100, 0.4);
            color: #ff6464;
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #4f8ef7, #7851a9);
            border-radius: 5px;
            border: 2px solid rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #6ba3ff, #9370db);
        }

        /* Firefox Scrollbar */
        * {
            scrollbar-color: linear-gradient(135deg, #4f8ef7, #7851a9) rgba(255, 255, 255, 0.05);
            scrollbar-width: thin;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            body {
                padding: 16px;
            }

            .container {
                gap: 20px;
            }

            h1 {
                font-size: 24px;
            }

            .subtitle {
                font-size: 13px;
            }

            .glass-card {
                padding: 20px;
                gap: 16px;
            }

            label {
                font-size: 10px;
            }

            input {
                padding: 9px 14px;
                font-size: 13px;
            }

            button {
                padding: 9px 14px;
                font-size: 13px;
            }

            .button-group {
                gap: 10px;
            }

            .result-card {
                padding: 14px;
                gap: 10px;
            }

            .url-output {
                padding: 10px;
                font-size: 11px;
                max-height: 100px;
            }

            .copy-btn {
                padding: 5px 10px;
                font-size: 11px;
            }

            .footer {
                font-size: 11px;
                padding: 0 8px;
            }

            .blob-1 {
                width: 60vw;
                height: 60vw;
            }

            .blob-2 {
                width: 50vw;
                height: 50vw;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 12px;
                min-height: 100dvh;
            }

            .container {
                gap: 16px;
            }

            .icon-box {
                width: 48px;
                height: 48px;
                margin-bottom: 4px;
            }

            .icon-box svg {
                width: 22px;
                height: 22px;
            }

            h1 {
                font-size: 20px;
            }

            .subtitle {
                font-size: 12px;
            }

            .glass-card {
                padding: 16px;
                gap: 14px;
            }

            .form-group {
                gap: 5px;
            }

            label {
                font-size: 9px;
                letter-spacing: 0.06em;
            }

            input {
                padding: 8px 12px;
                font-size: 12px;
                border-radius: 6px;
            }

            button {
                padding: 8px 12px;
                font-size: 12px;
                border-radius: 10px;
            }

            .button-group {
                gap: 8px;
                flex-direction: column;
            }

            .btn-secondary {
                width: 100%;
            }

            .result-card {
                padding: 12px;
                gap: 8px;
                border-radius: 10px;
            }

            .result-header {
                flex-wrap: wrap;
                gap: 8px;
            }

            .result-label {
                gap: 6px;
            }

            .result-icon {
                width: 24px;
                height: 24px;
                font-size: 12px;
            }

            .tag {
                font-size: 9px;
            }

            .copy-btn {
                padding: 4px 8px;
                font-size: 10px;
                border-radius: 4px;
            }

            .url-output {
                padding: 8px;
                font-size: 10px;
                line-height: 1.5;
                max-height: 80px;
            }

            .footer {
                font-size: 10px;
                padding: 0 4px;
                line-height: 1.4;
            }

            .blob-1 {
                width: 80vw;
                height: 80vw;
            }

            .blob-2 {
                width: 70vw;
                height: 70vw;
            }

            .toast {
                bottom: 16px;
                right: 12px;
                left: 12px;
                font-size: 12px;
            }
        }

        @media (max-width: 360px) {
            h1 {
                font-size: 18px;
            }

            .glass-card {
                padding: 14px;
            }

            input {
                padding: 7px 10px;
                font-size: 11px;
            }

            button {
                padding: 7px 10px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="icon-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                    <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                </svg>
            </div>
            <h1>Gerador de URL</h1>
            <p class="subtitle">Gere seus links <span>HLS</span> e <span>TS</span> de forma rápida</p>
        </div>

        <!-- Form Card -->
        <div class="glass-card">
            <div class="form-group">
                <label for="dns">DNS</label>
                <input type="text" id="dns" placeholder="http://seu.servidor.com:porta" autocomplete="off" spellcheck="false">
            </div>

            <div class="form-group">
                <label for="usuario">Usuário</label>
                <input type="text" id="usuario" placeholder="seu_usuario" autocomplete="off" spellcheck="false">
            </div>

            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="••••••••" autocomplete="off">
            </div>

            <div class="button-group">
                <button class="btn-primary" id="generateBtn">
                    <span>⚡</span>
                    <span class="btn-text">Gerar URLs</span>
                </button>
                <button class="btn-secondary hidden" id="clearBtn">
                    <span class="btn-text">Limpar</span>
                </button>
            </div>
        </div>

        <!-- Results -->
        <div id="results" class="hidden">
            <div class="results">
                <div class="result-card">
                    <div class="result-header">
                        <div class="result-label">
                            <div class="result-icon hls">📺</div>
                            <span class="tag hls">HLS</span>
                        </div>
                        <button class="copy-btn" data-copy="hls">
                            <span>📋</span> Copiar
                        </button>
                    </div>
                    <div class="url-output" id="hlsUrl"></div>
                </div>

                <div class="result-card">
                    <div class="result-header">
                        <div class="result-label">
                            <div class="result-icon ts">📻</div>
                            <span class="tag ts">TS</span>
                        </div>
                        <button class="copy-btn" data-copy="ts">
                            <span>📋</span> Copiar
                        </button>
                    </div>
                    <div class="url-output" id="tsUrl"></div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <p class="footer">Os dados preenchidos não são armazenados ou enviados a nenhum servidor.</p>
    </div>

    <script>
        const dnsInput = document.getElementById('dns');
        const usuarioInput = document.getElementById('usuario');
        const senhaInput = document.getElementById('senha');
        const generateBtn = document.getElementById('generateBtn');
        const clearBtn = document.getElementById('clearBtn');
        const resultsDiv = document.getElementById('results');
        const hlsUrlDiv = document.getElementById('hlsUrl');
        const tsUrlDiv = document.getElementById('tsUrl');

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function generateUrls() {
            const dns = dnsInput.value.trim();
            const usuario = usuarioInput.value.trim();
            const senha = senhaInput.value.trim();

            if (!dns || !usuario || !senha) {
                showToast('Preencha todos os campos antes de gerar.', 'error');
                return;
            }

            const cleanDns = dns.replace(/\/+$/, '');
            const hlsUrl = `${cleanDns}/get.php?username=${usuario}&password=${senha}&type=m3u_plus&output=hls`;
            const tsUrl = `${cleanDns}/get.php?username=${usuario}&password=${senha}&type=m3u_plus&output=mpegts`;

            hlsUrlDiv.textContent = hlsUrl;
            tsUrlDiv.textContent = tsUrl;

            resultsDiv.classList.remove('hidden');
            clearBtn.classList.remove('hidden');
            generateBtn.innerHTML = '<span>✏️</span><span class="btn-text">Editar</span>';

            showToast('URLs geradas com sucesso!');

            // Scroll para os resultados em mobile
            if (window.innerWidth <= 768) {
                setTimeout(() => {
                    resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }, 300);
            }
        }

        function clearForm() {
            dnsInput.value = '';
            usuarioInput.value = '';
            senhaInput.value = '';
            resultsDiv.classList.add('hidden');
            clearBtn.classList.add('hidden');
            generateBtn.innerHTML = '<span>⚡</span><span class="btn-text">Gerar URLs</span>';
            dnsInput.focus();
        }

        function copyToClipboard(type) {
            const text = type === 'hls' ? hlsUrlDiv.textContent : tsUrlDiv.textContent;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector(`[data-copy="${type}"]`);
                btn.classList.add('copied');
                btn.textContent = '✓ Copiado';
                setTimeout(() => {
                    btn.classList.remove('copied');
                    btn.textContent = '📋 Copiar';
                }, 2000);
                showToast(`URL ${type.toUpperCase()} copiada!`);
            }).catch(() => {
                showToast('Falha ao copiar. Tente manualmente.', 'error');
            });
        }

        generateBtn.addEventListener('click', generateUrls);
        clearBtn.addEventListener('click', clearForm);

        document.querySelectorAll('.copy-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const type = e.currentTarget.dataset.copy;
                copyToClipboard(type);
            });
        });

        // Enter key to generate
        [dnsInput, usuarioInput, senhaInput].forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') generateUrls();
            });
        });

        dnsInput.focus();
    </script>
</body>
</html>
